          example: false

    # --------------------------------------------------------------------------
    # Schedule Block Schemas
    # --------------------------------------------------------------------------
    ScheduleBlock:
      type: object
      required:
        - id_schedule_block
        - id_unidade
        - date_start
        - date_end
        - created_at
      properties:
        id_schedule_block:
          type: integer
          description: ID do bloqueio
          example: 1
        id_unidade:
          type: integer
          description: ID da unidade
          example: 123
        date_start:
          type: string
          format: date
          description: Data de inicio do bloqueio
          example: "2025-01-20"
        date_end:
          type: string
          format: date
          description: Data de fim do bloqueio
          example: "2025-01-24"
        time_start:
          type: string
          format: time
          nullable: true
          description: Horario de inicio do bloqueio (null = dia inteiro)
          example: "14:00:00"
        time_end:
          type: string
          format: time
          nullable: true
          description: Horario de fim do bloqueio (null = dia inteiro)
          example: "16:00:00"
        reason:
          type: string
          maxLength: 500
          description: Motivo do bloqueio
          example: "Ferias do coordenador"
        created_at:
          type: string
          format: date-time
          description: Data/hora de criacao do bloqueio
          example: "2025-01-10T10:00:00-03:00"

    CreateScheduleBlockRequest:
      type: object
      required:
        - id_unidade
        - date_start
        - date_end
      properties:
        id_unidade:
          type: integer
          description: ID da unidade
          example: 123
        date_start:
          type: string
          format: date
          description: Data de inicio do bloqueio
          example: "2025-01-20"
        date_end:
          type: string
          format: date
          description: Data de fim do bloqueio
          example: "2025-01-24"
        time_start:
          type: string
          format: time
          nullable: true
          description: Horario de inicio do bloqueio (omitir para dia inteiro)
          example: "14:00:00"
        time_end:
          type: string
          format: time
          nullable: true
          description: Horario de fim do bloqueio (omitir para dia inteiro)
          example: "16:00:00"
        reason:
          type: string
          maxLength: 500
          description: Motivo do bloqueio
          example: "Ferias do coordenador"

    UpdateScheduleBlockRequest:
      type: object
      properties:
        date_start:
          type: string
          format: date
          description: Nova data de inicio do bloqueio
          example: "2025-01-20"
        date_end:
          type: string
          format: date
          description: Nova data de fim do bloqueio
          example: "2025-01-26"
        time_start:
          type: string
          format: time
          nullable: true
          description: Novo horario de inicio do bloqueio
          example: "14:00:00"
        time_end:
          type: string
          format: time
          nullable: true
          description: Novo horario de fim do bloqueio
          example: "16:00:00"
        reason:
          type: string
          maxLength: 500
          description: Novo motivo do bloqueio
          example: "Ferias do coordenador - estendido"

    ScheduleBlockResponse:
      type: object
      required:
        - success
        - block
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Bloqueio criado com sucesso"
        block:
          $ref: '#/components/schemas/ScheduleBlock'

    # --------------------------------------------------------------------------
    # Job Schemas
    # --------------------------------------------------------------------------
    JobStatus:
      type: string
      enum:
        - draft
        - published
        - closed
      description: |
        Status da vaga:
        - `draft`: Rascunho, nao visivel publicamente
        - `published`: Publicada, candidatos podem visualizar e se candidatar
        - `closed`: Fechada, nao aceita novas candidaturas

    Job:
      type: object
      required:
        - id_job_subregional
        - id_job_gupy
        - job_name
        - id_subregional
        - status
        - created_at
      properties:
        id_job_subregional:
          type: integer
          description: ID interno da vaga
          example: 1
        id_job_gupy:
          type: string
          description: ID da vaga no Gupy
          example: "job_gupy_123"
        job_name:
          type: string
          maxLength: 200
          description: Nome da vaga
          example: "Professor de Matematica"
        id_subregional:
          type: integer
          description: ID da subregional
          example: 5
        subregional_nome:
          type: string
          description: Nome da subregional
          example: "Subregional Centro"
        status:
          $ref: '#/components/schemas/JobStatus'
        created_at:
          type: string
          format: date-time
          description: Data/hora de criacao da vaga
          example: "2025-01-05T10:00:00-03:00"
        unidades:
          type: array
          description: Lista de unidades vinculadas (quando include=unidades)
          items:
            $ref: '#/components/schemas/JobUnidade'

    JobUnidade:
      type: object
      required:
        - id_job_unidade
        - id_unidade
        - active
      properties:
        id_job_unidade:
          type: integer
          description: ID do vinculo vaga-unidade
          example: 10
        id_unidade:
          type: integer
          description: ID da unidade
          example: 123
        unidade_nome:
          type: string
          maxLength: 200
          description: Nome da unidade
          example: "Escola Centro"
        active:
          type: boolean
          description: Indica se o vinculo esta ativo
          example: true
        created_at:
          type: string
          format: date-time
          description: Data/hora de criacao do vinculo
          example: "2025-01-05T10:30:00-03:00"

    CreateJobRequest:
      type: object
      required:
        - id_job_gupy
        - job_name
        - id_subregional
      properties:
        id_job_gupy:
          type: string
          description: ID da vaga no Gupy
          example: "job_gupy_123"
        job_name:
          type: string
          maxLength: 200
          description: Nome da vaga
          example: "Professor de Matematica"
        id_subregional:
          type: integer
          description: ID da subregional
          example: 5
        unidades:
          type: array
          description: Lista de unidades a vincular na criacao
          items:
            type: object
            required:
              - id_unidade
            properties:
              id_unidade:
                type: integer
                description: ID da unidade
                example: 123

    UpdateJobRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/JobStatus'
        job_name:
          type: string
          description: Novo nome da vaga
          example: "Professor de Matematica - Atualizado"
        unidades:
          type: array
          description: Acoes sobre unidades vinculadas
          items:
            type: object
            properties:
              id_job_unidade:
                type: integer
                description: ID do vinculo (para acoes deactivate/activate)
                example: 10
              id_unidade:
                type: integer
                description: ID da unidade (para acao add)
                example: 789
              action:
                type: string
                enum:
                  - add
                  - deactivate
                  - activate
                description: Acao a executar
                example: "add"

    JobResponse:
      type: object
      required:
        - success
        - job
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Vaga criada com sucesso"
        job:
          $ref: '#/components/schemas/Job'

    # --------------------------------------------------------------------------
    # Gupy Schemas
    # --------------------------------------------------------------------------
    GupyApplication:
      type: object
      required:
        - id_application
        - candidate_name
        - candidate_email
        - job_id
        - job_name
        - current_step
        - applied_at
      properties:
        id_application:
          type: string
          maxLength: 100
          description: ID da candidatura no Gupy
