        job_id:
          type: string
          description: ID da vaga no Gupy
          example: "job_gupy_123"
        job_name:
          type: string
          maxLength: 200
          description: Nome da vaga
          example: "Professor de Matematica"
        current_step:
          type: string
          description: Fase atual do candidato no processo seletivo
          example: "Aula Teste"
        applied_at:
          type: string
          format: date-time
          description: Data/hora da candidatura
          example: "2025-01-01T10:00:00-03:00"

    # --------------------------------------------------------------------------
    # Auth Schemas
    # --------------------------------------------------------------------------
    LoginRequest:
      type: object
      required:
        - email
        - password
