          format: email
          description: Email do novo usuario
          example: "novo.usuario@tomeducacao.com.br"
        password:
          type: string
          format: password
          minLength: 8
          description: Senha do novo usuario
          example: "senha123"
        nome:
          type: string
          description: Nome do novo usuario
          example: "Novo Usuario"
        role:
          type: string
          enum:
            - admin
            - recrutamento
            - coordenador
          description: Role do novo usuario
          example: "recrutamento"
        id_unidade:
          type: integer
          nullable: true
          description: ID da unidade (obrigatorio para coordenador)
          example: 123

    RegisterResponse:
      type: object
      required:
        - success
        - message
        - user
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Usuario registrado com sucesso"
        user:
          $ref: '#/components/schemas/UserInfo'

    UserInfo:
      type: object
      required:
        - id_usuario
        - email
        - nome
        - role
      properties:
        id_usuario:
          type: integer
          description: ID do usuario
          example: 1
        email:
          type: string
          format: email
          description: Email do usuario
          example: "usuario@tomeducacao.com.br"
        nome:
          type: string
          description: Nome do usuario
          example: "Usuario Teste"
        role:
          type: string
          enum:
            - admin
            - recrutamento
            - coordenador
          description: Role do usuario
          example: "recrutamento"
        id_unidade:
          type: integer
          nullable: true
          description: ID da unidade (para coordenadores)
          example: 123

    UserResponse:
      type: object
      required:
        - success
        - user
      properties:
        success:
          type: boolean
          example: true
        user:
          allOf:
            - $ref: '#/components/schemas/UserInfo'
            - type: object
              properties:
                unidade_nome:
                  type: string
                  maxLength: 200
                  description: Nome da unidade (para coordenadores)
                  example: "Escola Centro"
