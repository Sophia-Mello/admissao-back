          type: integer
          nullable: true
          description: ID da unidade (null = configuracao global)
          example: 123
        morning_start_at:
          type: string
          format: time
          description: Horario de inicio do periodo da manha
          example: "08:00:00"
        morning_end_at:
          type: string
          format: time
          description: Horario de fim do periodo da manha
          example: "12:00:00"
        afternoon_start_at:
          type: string
          format: time
          description: Horario de inicio do periodo da tarde
          example: "13:00:00"
        afternoon_end_at:
          type: string
          format: time
          description: Horario de fim do periodo da tarde
          example: "17:00:00"
        slot_size:
          type: integer
          minimum: 15
          maximum: 120
          description: Duracao do slot em minutos
          example: 50
        d_rule_start:
          type: integer
          minimum: 0
          description: Dias minimos de antecedencia para agendamento
          example: 1
        d_rule_end:
          type: integer
          minimum: 1
          description: Dias maximos de antecedencia para agendamento
          example: 30
        valid_from:
          type: string
          format: date
          nullable: true
          description: Data de inicio da validade da configuracao
          example: "2025-01-01"
        valid_until:
          type: string
          format: date
          nullable: true
          description: Data de fim da validade da configuracao
          example: "2025-03-31"
        active:
          type: boolean
          description: Indica se a configuracao esta ativa
          example: true

    ScheduleConfigRequest:
      type: object
      required:
        - morning_start_at
        - morning_end_at
        - afternoon_start_at
        - afternoon_end_at
        - slot_size
        - d_rule_start
        - d_rule_end
      properties:
        id_unidade:
          type: integer
          nullable: true
          description: ID da unidade (null = configuracao global)
          example: 123
        morning_start_at:
          type: string
          format: time
          description: Horario de inicio do periodo da manha
          example: "08:00:00"
        morning_end_at:
          type: string
          format: time
          description: Horario de fim do periodo da manha
          example: "12:00:00"
        afternoon_start_at:
          type: string
          format: time
          description: Horario de inicio do periodo da tarde
          example: "13:00:00"
        afternoon_end_at:
          type: string
          format: time
          description: Horario de fim do periodo da tarde
          example: "17:00:00"
        slot_size:
          type: integer
          minimum: 15
          maximum: 120
          description: Duracao do slot em minutos
          example: 50
        d_rule_start:
          type: integer
          minimum: 0
          description: Dias minimos de antecedencia para agendamento
          example: 1
        d_rule_end:
          type: integer
          minimum: 1
          description: Dias maximos de antecedencia para agendamento
          example: 30
        valid_from:
          type: string
          format: date
          nullable: true
          description: Data de inicio da validade da configuracao
          example: "2025-01-01"
        valid_until:
          type: string
          format: date
          nullable: true
          description: Data de fim da validade da configuracao
          example: "2025-03-31"
        active:
          type: boolean
          default: true
          description: Indica se a configuracao esta ativa
          example: true

    ScheduleConfigResponse:
      type: object
      required:
        - success
        - config
      properties:
        success:
          type: boolean
          example: true
